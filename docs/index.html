<!DOCTYPE html>

    <style>
        tr {
            line-height: 40px;
        }

        .table_wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            /*height: 100vh; !* Optional: Set a specific height for centering vertically *!*/
        }

        /* 使用 margin 来增加列间距 */
        table {
            border-collapse: collapse; /* 合并表格边框 */
        }

        td, th {
            margin: 10px; /* 增加列间距 */
            padding: 10px; /* 增加内容内边距 */
        }

        /*文字列内居中*/
        th, td {
            text-align: center;
            vertical-align: middle;
        }

            text-align: center;
        }

        .img_structure {

            max-width: 60vw;
        }

        .card {

        .card2 {
