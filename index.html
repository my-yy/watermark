<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="./data.js"></script>
    <style>
        tr {
            line-height: 40px;
        }

        #app {
            display: flex;
            justify-content: center;
            align-items: center;
            /*height: 100vh; !* Optional: Set a specific height for centering vertically *!*/
        }

        /* 使用 margin 来增加列间距 */
        table {
            border-collapse: collapse; /* 合并表格边框 */
        }

        td, th {
            margin: 10px; /* 增加列间距 */
            padding: 10px; /* 增加内容内边距 */
        }

        /*文字列内居中*/
        th, td {
            text-align: center;
            vertical-align: middle;
        }

    </style>

</head>
<body>

<div id="app">
    <table>
        <thead>
        <tr>
            <th>Dataset</th>
            <th>Host Audio</th>
            <th>Watermarked Audio</th>
            <th>SNR</th>
            <th>PESQ</th>
        </tr>
        </thead>
        <tbody>
        <tr v-for="i in items">
            <td>{{i.dataset}}</td>
            <td>
                <audio controls>
                    <source :src="'data/'+i.origin" type="audio/wav">
                </audio>
            </td>
            <td>
                <audio controls>
                    <source :src="'data/'+i.wmd" type="audio/wav">
                </audio>
            </td>
            <td>{{myToFixed(i.snr)}}</td>
            <td>{{myToFixed(i.pesq)}}</td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    var app = new Vue({
        el: '#app',
        data: {
            items: data_list,
        },
        methods: {
            myToFixed(v) {
                try {
                    return v.toFixed(2)
                } catch (e) {
                    return v
                }
            }

        }
    })
</script>

</body>
</html>
